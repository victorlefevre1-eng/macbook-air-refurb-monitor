name: macbook-air-refurb-monitor

on:
  schedule:
    # GitHub cron minimum interval is 5 minutes; timing is best-effort.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write          # needed to commit state.json back

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run refurb check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MAX_PRICE: ${{ secrets.MAX_PRICE }}
        run: python monitor.py

      - name: Persist alert state
        run: |
          if ! git diff --quiet -- state.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "update alert state [skip ci]"
            git push
          else
            echo "no state change"
          fi
